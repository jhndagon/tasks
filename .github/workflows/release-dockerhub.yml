name: Release Docker Image

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - helm/python-api/values.yaml

concurrency:
  group: release-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and Push Docker Image
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write

    env:
      MAJOR_MINOR: "0.1"
      IMAGE_REPOSITORY: jhndagon11/tasks
      GH_TOKEN_FOR_TAGS: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute and push release tag
        id: release
        run: |
          set -euo pipefail

          CREATED="false"

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            TAG="v${MAJOR_MINOR}.${GITHUB_RUN_NUMBER}"
          else
            TAG="dev-${GITHUB_RUN_NUMBER}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git remote set-url origin "https://x-access-token:${GH_TOKEN_FOR_TAGS}@github.com/${GITHUB_REPOSITORY}.git"
            git fetch --tags --force

            if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" > /dev/null 2>&1; then
              echo "Tag ${TAG} already exists in origin; skipping creation."
            else
              git tag -a "${TAG}" -m "Release ${TAG}"
              git push origin "${TAG}"
              CREATED="true"
            fi
          fi

          echo "tag_created=${CREATED}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.release.outputs.tag_created == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          generate_release_notes: true
          token: ${{ env.GH_TOKEN_FOR_TAGS }}

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:${{ steps.release.outputs.tag }}
            ${{ env.IMAGE_REPOSITORY }}:latest
            ${{ env.IMAGE_REPOSITORY }}:sha-${{ github.sha }}

      - name: Force latest to current release digest
        run: |
          docker buildx imagetools create \
            -t "${IMAGE_REPOSITORY}:latest" \
            "${IMAGE_REPOSITORY}:${{ steps.release.outputs.tag }}"

      - name: Update Helm chart image tag
        run: |
          set -euo pipefail

          NEW_TAG="${{ steps.release.outputs.tag }}"
          VALUES_FILE="helm/python-api/values.yaml"

          sed -E -i.bak "s/^  tag: .*/  tag: ${NEW_TAG}/" "${VALUES_FILE}"
          rm -f "${VALUES_FILE}.bak"

      - name: Create PR for Helm image tag update
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ env.GH_TOKEN_FOR_TAGS }}
          commit-message: chore(deploy): update image tag to ${{ steps.release.outputs.tag }}
          title: chore(deploy): update image tag to ${{ steps.release.outputs.tag }}
          body: |
            Automated image tag update after Docker release.
          branch: chore/helm-image-tag-${{ github.ref_name }}-${{ steps.release.outputs.tag }}
          base: ${{ github.ref_name }}
          add-paths: |
            helm/python-api/values.yaml
          delete-branch: true
