name: Release Docker Image

on:
  push:
    branches:
      - main

concurrency:
  group: release-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and Push Docker Image
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    env:
      MAJOR_MINOR: "0.1"
      IMAGE_REPOSITORY: jhndagon11/tasks
      GH_TOKEN_FOR_TAGS: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute and push release tag
        id: release
        run: |
          set -euo pipefail

          TAG="v${MAJOR_MINOR}.${GITHUB_RUN_NUMBER}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN_FOR_TAGS}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --tags --force

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" > /dev/null 2>&1; then
            echo "Tag ${TAG} already exists in origin; skipping creation."
          else
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
          fi

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:${{ steps.release.outputs.tag }}
            ${{ env.IMAGE_REPOSITORY }}:latest
            ${{ env.IMAGE_REPOSITORY }}:sha-${{ github.sha }}

      - name: Force latest to current release digest
        run: |
          docker buildx imagetools create \
            -t "${IMAGE_REPOSITORY}:latest" \
            "${IMAGE_REPOSITORY}:${{ steps.release.outputs.tag }}"

      - name: Update Helm chart image tag
        run: |
          set -euo pipefail

          NEW_TAG="${{ steps.release.outputs.tag }}"
          VALUES_FILE="helm/python-api/values.yaml"

          sed -E -i.bak "s/^  tag: .*/  tag: ${NEW_TAG}/" "${VALUES_FILE}"
          rm -f "${VALUES_FILE}.bak"

          if git diff --quiet -- "${VALUES_FILE}"; then
            echo "No Helm values changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${VALUES_FILE}"
          git commit -m "chore(deploy): update image tag to ${NEW_TAG}"
          git push origin HEAD:main
