name: Release Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
      - release/**
    paths-ignore:
      - helm/python-api/values.yaml

concurrency:
  group: release-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write

    env:
      MAJOR_MINOR: "0.1"
      GH_TOKEN_FOR_TAGS: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || github.token }}

    steps:
      - name: Show run context
        run: |
          echo "actor=${GITHUB_ACTOR}"
          echo "ref=${GITHUB_REF}"
          echo "ref_name=${GITHUB_REF_NAME}"
          echo "event=${GITHUB_EVENT_NAME}"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secrets
        run: |
          set -euo pipefail
          [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] || (echo "Missing DOCKERHUB_USERNAME secret" && exit 1)
          [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ] || (echo "Missing DOCKERHUB_TOKEN secret" && exit 1)
          [ -n "${{ env.GH_TOKEN_FOR_TAGS }}" ] || (echo "Missing RELEASE_TOKEN (or unusable github.token)" && exit 1)

      - name: Resolve Docker repository
        id: docker_repo
        run: |
          set -euo pipefail
          IMAGE_REPOSITORY="${{ secrets.DOCKERHUB_REPOSITORY }}"
          if [ -z "${IMAGE_REPOSITORY}" ]; then
            IMAGE_REPOSITORY="${{ secrets.DOCKERHUB_USERNAME }}/tasks"
          fi

          case "${IMAGE_REPOSITORY}" in
            */*) ;;
            *)
              echo "Invalid Docker repository '${IMAGE_REPOSITORY}'. Use <namespace>/<name>."
              exit 1
              ;;
          esac

          echo "repository=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "docker_repository=${IMAGE_REPOSITORY}"

      - name: Compute and push release tag
        id: release
        run: |
          set -euo pipefail

          TARGET_BRANCH="${GITHUB_REF_NAME}"
          RELEASE_KIND="dev"

          if [ "${TARGET_BRANCH}" = "main" ]; then
            RELEASE_KIND="main"
            git fetch --tags --force
            LAST_TAG="$(git tag -l 'v0.1.*' | sort -V | tail -n 1)"
            if [ -z "${LAST_TAG}" ]; then
              PATCH=1
            else
              PATCH=$(( ${LAST_TAG##*.} + 1 ))
            fi
            TAG="v${MAJOR_MINOR}.${PATCH}"

            while git ls-remote --exit-code --tags origin "refs/tags/${TAG}" > /dev/null 2>&1; do
              PATCH=$((PATCH + 1))
              TAG="v${MAJOR_MINOR}.${PATCH}"
            done
          else
            TAG="dev-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
            DEV_SEQ=0
            while git ls-remote --exit-code --tags origin "refs/tags/${TAG}" > /dev/null 2>&1; do
              DEV_SEQ=$((DEV_SEQ + 1))
              TAG="dev-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${DEV_SEQ}"
            done
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "release_kind=${RELEASE_KIND}" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN_FOR_TAGS}@github.com/${GITHUB_REPOSITORY}.git"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub Release
        if: steps.release.outputs.release_kind == 'main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          generate_release_notes: true
          token: ${{ env.GH_TOKEN_FOR_TAGS }}

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.docker_repo.outputs.repository }}:${{ steps.release.outputs.tag }}
            ${{ steps.docker_repo.outputs.repository }}:latest
            ${{ steps.docker_repo.outputs.repository }}:sha-${{ github.sha }}

      - name: Force latest to current release digest
        run: |
          IMAGE_REPOSITORY="${{ steps.docker_repo.outputs.repository }}"
          docker buildx imagetools create \
            -t "${IMAGE_REPOSITORY}:latest" \
            "${IMAGE_REPOSITORY}:${{ steps.release.outputs.tag }}"

      - name: Verify DockerHub tags
        run: |
          IMAGE_REPOSITORY="${{ steps.docker_repo.outputs.repository }}"
          docker buildx imagetools inspect "${IMAGE_REPOSITORY}:${{ steps.release.outputs.tag }}"
          docker buildx imagetools inspect "${IMAGE_REPOSITORY}:latest"

      - name: Update Helm chart image tag
        run: |
          set -euo pipefail

          NEW_TAG="${{ steps.release.outputs.tag }}"
          VALUES_FILE="helm/python-api/values.yaml"

          sed -E -i.bak "s/^  tag: .*/  tag: ${NEW_TAG}/" "${VALUES_FILE}"
          rm -f "${VALUES_FILE}.bak"

      - name: Create PR for Helm image tag update
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ env.GH_TOKEN_FOR_TAGS }}
          commit-message: "chore(deploy): update image tag to ${{ steps.release.outputs.tag }}"
          title: "chore(deploy): update image tag to ${{ steps.release.outputs.tag }}"
          body: |
            Automated image tag update after Docker release.
          branch: chore/helm-image-tag-${{ github.ref_name }}-${{ steps.release.outputs.tag }}
          base: ${{ github.ref_name }}
          add-paths: |
            helm/python-api/values.yaml
          delete-branch: true
